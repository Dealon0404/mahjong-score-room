name: Deploy Live Backend to Vercel

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-live-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN || 'https://dealon0404.github.io' }}
      LIVE_ROOM_TTL_SECONDS: ${{ secrets.LIVE_ROOM_TTL_SECONDS || '86400' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@56.3.1

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy production backend
        id: deploy
        shell: bash
        run: |
          url=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" \
            --env UPSTASH_REDIS_REST_URL="$UPSTASH_REDIS_REST_URL" \
            --env UPSTASH_REDIS_REST_TOKEN="$UPSTASH_REDIS_REST_TOKEN" \
            --env ALLOWED_ORIGIN="$ALLOWED_ORIGIN" \
            --env LIVE_ROOM_TTL_SECONDS="$LIVE_ROOM_TTL_SECONDS" | tail -n 1)
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Verify persistent live backend
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          base = os.environ['DEPLOYMENT_URL'].rstrip('/')
          url = f'{base}/api/live-room?health=1'
          last_error = None
          for _ in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      payload = json.loads(response.read().decode('utf-8'))
                  print(json.dumps(payload, ensure_ascii=False))
                  if payload.get('ok') and payload.get('persistent') and payload.get('storage') == 'upstash-redis':
                      sys.exit(0)
                  last_error = f'Unexpected health payload: {payload}'
              except Exception as error:
                  last_error = str(error)
              time.sleep(5)
          raise SystemExit(f'Live backend is not persistent: {last_error}')
          PY